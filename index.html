<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laika Agent</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: #00f7ff;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #00f7ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00c3cc;
}

#qrcode {
    margin-top: 20px;
}

.loading {
    display: none;
    margin-top: 20px;
}

.scan-line {
    width: 100%;
    height: 3px;
    background: red;
    animation: scan 2s infinite;
}

@keyframes scan {
    0% {transform: translateY(0);}
    50% {transform: translateY(200px);}
    100% {transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 Laika Agent</h1>

    <div class="card">

        <h3>👤 Personal Details</h3>
        <input type="text" id="name" placeholder="Full Name">
        <input type="number" id="age" placeholder="Age">
        <input type="tel" id="phone" placeholder="Phone Number">
        <input type="email" id="email" placeholder="Email">

        <textarea id="address" placeholder="Address"></textarea>

        <select id="type">
            <option value="">Select Type</option>
            <option value="Individual">Individual</option>
            <option value="Business">Business</option>
        </select>

        <input type="text" id="businessName" placeholder="Business Name (if any)">

        <h3>🔗 Extra Text / URL</h3>
        <textarea id="textInput" placeholder="Enter text or URL..."></textarea>

        <h3>📁 OR Upload File</h3>
        <input type="file" id="fileInput" accept="image/*,.pdf">

        <button onclick="generateQR()">Generate QR Code</button>

        <div class="loading" id="loading">
            <p id="loadingText">🔄 Creating QR Code...</p>
            <div class="scan-line"></div>
        </div>

        <div id="qrcode"></div>

        <button id="downloadBtn" style="display:none;" onclick="downloadQR()">Download QR</button>
    </div>
</div>

<script>
function generateQR() {
    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const address = document.getElementById("address").value.trim();
    const type = document.getElementById("type").value.trim();
    const business = document.getElementById("businessName").value.trim();
    const text = document.getElementById("textInput").value.trim();
    const file = document.getElementById("fileInput").files[0];

    document.getElementById("qrcode").innerHTML = "";
    document.getElementById("downloadBtn").style.display = "none";
    
    const loadingDiv = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");
    loadingDiv.style.display = "block";

    // 1. If user uploaded a file, send it to Cloudinary first
    if (file) {
        loadingText.innerText = "☁️ Uploading to Cloudinary...";
        
        const formData = new FormData();
        formData.append("file", file);
        // We use an "unsigned preset" here instead of your API Secret for security
        formData.append("upload_preset", "laika_preset"); 

        fetch("https://api.cloudinary.com/v1_1/dge1gydq3/auto/upload", {
            method: "POST",
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.secure_url) {
                loadingText.innerText = "🔄 Generating QR Code...";
                // Create the QR code with the Cloudinary URL
                renderQRCanvas(data.secure_url); 
            } else {
                alert("Upload failed! Did you create the 'laika_preset' in Cloudinary?");
                loadingDiv.style.display = "none";
                console.error("Cloudinary Error:", data);
            }
        })
        .catch(error => {
            alert("Network error occurred during upload.");
            loadingDiv.style.display = "none";
            console.error(error);
        });

    } else {
        // 2. If no file, generate a text-based QR code as usual
        setTimeout(() => {
            let dataParts = [];
            if (name) dataParts.push(`Name: ${name}`);
            if (age) dataParts.push(`Age: ${age}`);
            if (phone) dataParts.push(`Phone: ${phone}`);
            if (email) dataParts.push(`Email: ${email}`);
            if (address) dataParts.push(`Address: ${address}`);
            if (type) dataParts.push(`Type: ${type}`);
            if (business) dataParts.push(`Business: ${business}`);
            if (text) dataParts.push(`Extra: ${text}`);

            let qrData = dataParts.join('\n');

            if (!qrData) {
                alert("Please fill in at least one detail or upload a file.");
                loadingDiv.style.display = "none";
                return;
            }

            renderQRCanvas(qrData);
        }, 800);
    }
}

function renderQRCanvas(data) {
    QRCode.toCanvas(data, { width: 250, margin: 2 }, function (error, canvas) {
        document.getElementById("loading").style.display = "none";

        if (error) {
            console.error(error);
            alert("Error generating QR.");
            return;
        }

        document.getElementById("qrcode").appendChild(canvas);
        document.getElementById("downloadBtn").style.display = "block";

        alert("✅ QR Code Generated Successfully!");
    });
}

function downloadQR() {
    const canvas = document.querySelector("#qrcode canvas");
    if (!canvas) return;
    const link = document.createElement("a");
    link.download = "laika_qr.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
