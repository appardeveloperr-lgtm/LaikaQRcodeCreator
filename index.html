<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laika Agent</title>

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: #00f7ff;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #00f7ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00c3cc;
}

#qrcode {
    margin-top: 20px;
}

.loading {
    display: none;
    margin-top: 20px;
}

.scan-line {
    width: 100%;
    height: 3px;
    background: red;
    animation: scan 2s infinite;
}

@keyframes scan {
    0% {transform: translateY(0);}
    50% {transform: translateY(200px);}
    100% {transform: translateY(0);}
}

.suggestion {
    margin-top: 10px;
    font-size: 14px;
    color: #00ff99;
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 Laika Agent</h1>

    <div class="card">
        <h3>Enter Text / URL</h3>
        <textarea id="textInput" placeholder="Enter text or URL..."></textarea>

        <div class="suggestion" id="suggestion"></div>

        <h3>OR Upload Image/File</h3>
        <input type="file" id="fileInput" accept="image/*,.pdf">

        <button onclick="generateQR()">Generate QR Code</button>

        <div class="loading" id="loading">
            <p>🔄 Creating QR Code...</p>
            <div class="scan-line"></div>
        </div>

        <div id="qrcode"></div>

        <button id="downloadBtn" style="display:none;" onclick="downloadQR()">Download QR</button>
    </div>
</div>

<script>
let qrData = "";

document.getElementById("textInput").addEventListener("input", function() {
    let text = this.value;
    let suggestion = "";

    if (text.includes("http")) {
        suggestion = "🔗 Detected URL. QR will open website.";
    } else if (text.length > 50) {
        suggestion = "⚠️ Long text detected. Consider shortening for better QR.";
    } else if (text.length > 0) {
        suggestion = "📝 Text will be encoded into QR.";
    }

    document.getElementById("suggestion").innerText = suggestion;
});

function generateQR() {
    const text = document.getElementById("textInput").value;
    const file = document.getElementById("fileInput").files[0];

    document.getElementById("qrcode").innerHTML = "";
    document.getElementById("loading").style.display = "block";
    document.getElementById("downloadBtn").style.display = "none";

    setTimeout(() => {

        if (file) {
            // Simulate file URL (since no backend)
            qrData = URL.createObjectURL(file);
        } else {
            qrData = text;
        }

        if (!qrData) {
            alert("Please enter text or upload file");
            document.getElementById("loading").style.display = "none";
            return;
        }

        QRCode.toCanvas(qrData, { width: 250 }, function (error, canvas) {
            document.getElementById("loading").style.display = "none";

            if (error) {
                alert("Error generating QR");
                return;
            }

            document.getElementById("qrcode").appendChild(canvas);
            document.getElementById("downloadBtn").style.display = "block";

            alert("✅ QR Code Generated Successfully!");
        });

    }, 2000); // animation delay
}

function downloadQR() {
    const canvas = document.querySelector("#qrcode canvas");
    const link = document.createElement("a");
    link.download = "laika_qr.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
